name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download app icon
      run: |
        curl -sL "https://bvdhytb-nhacthuoc.pages.dev/icon-512.png" -o /tmp/icon.png 2>/dev/null || true
        if [ -f /tmp/icon.png ] && [ $(stat -c%s /tmp/icon.png) -gt 1000 ]; then
          for density_size in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            DENSITY=$(echo $density_size | cut -d: -f1)
            SIZE=$(echo $density_size | cut -d: -f2)
            DIR="android/app/src/main/res/mipmap-${DENSITY}"
            mkdir -p "$DIR"
            convert /tmp/icon.png -resize ${SIZE}x${SIZE} "$DIR/ic_launcher.png" 2>/dev/null || true
            cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_round.png" 2>/dev/null || true
          done
        fi

    - name: Copy web assets to Android
      run: |
        mkdir -p android/app/src/main/assets/public
        for f in index.html app.js app.css sw.js push-manager.js manifest.webmanifest icon-192.png icon-512.png apple-touch-icon.png; do
          [ -f "$f" ] && cp "$f" android/app/src/main/assets/public/ && echo "Copied $f"
        done
        [ -d ".well-known" ] && cp -r .well-known android/app/src/main/assets/public/ || true

    - name: Generate Gradle Wrapper
      run: |
        cd android
        gradle wrapper --gradle-version 8.4
        chmod +x ./gradlew

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: BVDHYTB-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90
