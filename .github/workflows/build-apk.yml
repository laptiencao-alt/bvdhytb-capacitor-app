name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix icon filenames
        run: |
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            DIR="android/app/src/main/res/mipmap-${density}"
            for f in "$DIR"/*.png; do
              base=$(basename "$f")
              if [ "$base" != "ic_launcher.png" ] && [ "$base" != "ic_launcher_round.png" ]; then
                cp "$f" "$DIR/ic_launcher.png"
                cp "$f" "$DIR/ic_launcher_round.png"
              fi
            done
          done

      - name: Copy web assets to Android
        run: mkdir -p android/app/src/main/assets/public

      - name: Generate Keystore (first time only)
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            keytool -genkey -v \
              -keystore bvdhytb.keystore \
              -alias bvdhytb \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=BVDHYTB, OU=IT, O=Benh vien Dai hoc Y Thai Binh, L=Thai Binh, ST=Thai Binh, C=VN" \
              -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
              -keypass ${{ secrets.KEYSTORE_PASSWORD }}
          else
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > bvdhytb.keystore
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build Signed APK
        run: |
          cd android
          gradle assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/../bvdhytb.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=android \
            -Pandroid.injected.signing.key.password=${{ secrets.KEYSTORE_PASSWORD }}

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
             MedReminder-BvDHYTB.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BVDHYTB-release-apk
          path: MedReminder-BvDHYTB.apk
          retention-days: 90

      - name: Publish to Stable Release
        uses: ncipollo/release-action@v1
        with:
          tag: "stable"
          name: "MedReminder BV DHY Thai Binh - Phien ban moi nhat"
          body: "Ung dung nhac thuoc - Benh vien Dai hoc Y Thai Binh. File nay duoc cap nhat tu dong moi khi co build moi."
          artifacts: "MedReminder-BvDHYTB.apk"
          allowUpdates: true
          removeArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
