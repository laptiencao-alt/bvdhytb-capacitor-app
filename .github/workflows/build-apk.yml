name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Fix icon filenames
      run: |
        # Đổi tên file icon về đúng ic_launcher.png
        for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
          DIR="android/app/src/main/res/mipmap-${density}"
          # Tìm file bất kỳ .png trong thư mục và đổi tên thành ic_launcher.png
          for f in "$DIR"/*.png; do
            base=$(basename "$f")
            if [ "$base" != "ic_launcher.png" ] && [ "$base" != "ic_launcher_round.png" ]; then
              cp "$f" "$DIR/ic_launcher.png"
              cp "$f" "$DIR/ic_launcher_round.png"
              echo "Fixed $density: $base → ic_launcher.png"
            fi
          done
        done

    - name: Copy web assets to Android
      run: |
        mkdir -p android/app/src/main/assets/public
        if [ -d "pw4" ]; then
          cp -r pw4/. android/app/src/main/assets/public/
          echo "Copied from pw4 folder"
        fi

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Build Debug APK
      run: |
        cd android
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: BVDHYTB-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90
